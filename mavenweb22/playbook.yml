---
- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks: 
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5042/workspace/mavenweb22an/mavenweb22/target/mavenweb22.war"
        dest: "opt/tomcat/webapps/mavenweb22.war"
        remote_src: no
        
    - name: Restart Tomcat
      systemd:
      	name: tomcat
      	state: restarted
    

